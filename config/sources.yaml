sources:

  # ── Australia ──────────────────────────────────────────────────────────────
  - id: epg_pw_au
    name: "epg.pw Australia"
    url: "https://epg.pw/xmltv/epg_AU.xml"
    country: AU
    priority: 1
    enabled: true
    timeout: 120
    retry: 3

  - id: xmltv_au
    name: "xmltv.net Australia"
    url: "https://xmltv.net/xml_files/Australia.xml"
    country: AU
    priority: 2
    enabled: true
    timeout: 120
    retry: 2


sources:

  # ── Provider EPG (PRIMARY) ──────────────────────────────────────────────────
  # The strong8k Xtream EPG is correct for every channel it carries (no time
  # offset), includes live-sports listings (F1, AFL, etc.) that no free source
  # has, and uses the same dotted channel IDs as the M3U — so it needs no
  # channel_map and wins channel ownership over epg.pw.
  #
  # The full URL (http://HOST/xmltv.php?username=...&password=...) is injected
  # from the XTREAM_EPG_URL secret so no credentials or host ever land in the
  # repo. If the secret is unset the source disables itself and the build falls
  # back to epg.pw alone.
  - id: xtream_provider
    name: "Provider Xtream EPG"
    url: "${XTREAM_EPG_URL}"
    country: ALL
    multi_country: true
    priority: 1
    enabled: true
    timeout: 180
    retry: 2
    time_shift_hours: 0
    # Xtream panels often return an empty body to unknown clients; present a
    # media-player UA so the EPG endpoint responds.
    user_agent: "VLC/3.0.20 LibVLC/3.0.20"

  # ── Australia ──────────────────────────────────────────────────────────────
  - id: epg_pw_au
    name: "epg.pw Australia"
    url: "https://epg.pw/xmltv/epg_AU.xml"
    country: AU
    priority: 2
    enabled: true
    timeout: 120
    retry: 3
    time_shift_hours: -8

  # xmltv.net AU returns non-XML content (HTTP 200 HTML page) — disabled
  # - id: xmltv_au
  #   url: "https://xmltv.net/xml_files/Australia.xml"
  #   country: AU
  #   priority: 2
  #   enabled: false

  # ── United Kingdom ─────────────────────────────────────────────────────────
  - id: epg_pw_gb
    name: "epg.pw United Kingdom"
    url: "https://epg.pw/xmltv/epg_GB.xml"
    country: GB
    priority: 2
    enabled: true
    timeout: 120
    retry: 3
    time_shift_hours: -8
    # epg.pw's 12xxx-series channel IDs carry an extra 8-hour lag on top of
    # the base 8-hour offset that affects the 486xxx/9xxx series — so channels
    # in this range need −16 h total (base −8 h + the −8 h below).
    per_channel_shifts:
      "12020": -8   # Colors.uk
      "12021": -8   # GOLD.uk
      "12024": -8   # SkyAction.uk / SkySportsAction.uk
      "12067": -8   # StartTV.us
      "12069": -8   # SkyNews.uk
      "12084": -8   # Nickelodeon.uk/.ca/.us
      "12090": -8   # W.uk
      "12094": -8   # Drama.uk
      "12111": -8   # Film4.uk
      "12117": -8   # BBCParliament.uk
      "12121": -8   # SkyReplay.uk
      "12135": -8   # SkyArts.uk
      "12164": -8   # More4.uk
      "12178": -8   # FiveUSA.uk
      "12185": -8   # DiscoveryLife.us
      "12190": -8   # SkySportsF1.uk
      "12191": -8   # SkySportsFootball.uk / SkySportsPremiereLeague.uk
      "12200": -8   # SkySportsRacing.uk
      "12220": -8   # Alibi.uk
      "12221": -8   # Eden.uk
      "12223": -8   # SkySportsNews.uk
      "12239": -8   # SkyDocumentaries.uk
      "12250": -8   # BBCOneWales.uk
      "12252": -8   # BBCTwoWales.uk
      "12258": -8   # MUTV.uk
      "12306": -8   # SkySportsMainEvent.uk
      "12317": -8   # CBSReality.uk
      "12322": -8   # SkyComedy.uk
      "12358": -8   # SkySportsArena.uk
      "12366": -8   # SkyAtlantic.uk
      "12373": -8   # RealityXtra.uk
      "12379": -8   # BBCOneEastMidlands.uk
      "12385": -8   # BBCOneNorthWest/Oxford/SouthEast/WestMidlands.uk
      "12404": -8   # SkyCrime.uk
      "12496": -8   # NickJunior.uk
      "12504": -8   # BBCAlba.uk
      "12505": -8   # BBCScotland.uk
      "12506": -8   # SonyMax.uk
      "12518": -8   # SkyWitness.uk
      "12534": -8   # RacingUK.uk
      "12544": -8   # E4.uk
      "12559": -8   # MTV.ca/.us / MTV2.ca/.us / KMTV.us
      "12563": -8   # SkySportsMix.uk
      "12565": -8   # NatGeo.uk/.ca/.us

  # xmltv.net GB returns non-XML content — disabled
  # - id: xmltv_gb
  #   url: "https://xmltv.net/xml_files/United_Kingdom.xml"
  #   country: GB
  #   priority: 2
  #   enabled: false

  # ── United States ──────────────────────────────────────────────────────────
  - id: epg_pw_us
    name: "epg.pw United States"
    url: "https://epg.pw/xmltv/epg_US.xml"
    country: US
    priority: 2
    enabled: true
    timeout: 300
    retry: 3
    time_shift_hours: -8
    per_channel_shifts:
      "12067": -8   # StartTV.us
      "12084": -8   # Nickelodeon.us
      "12185": -8   # DiscoveryLife.us
      "12559": -8   # MTV.us / MTV2.us / KMTV.us
      "12565": -8   # NatGeo.us

  # xmltv.net US returns non-XML content — disabled
  # - id: xmltv_us
  #   url: "https://xmltv.net/xml_files/United_States.xml"
  #   country: US
  #   priority: 2
  #   enabled: false

  # ── Canada ─────────────────────────────────────────────────────────────────
  - id: epg_pw_ca
    name: "epg.pw Canada"
    url: "https://epg.pw/xmltv/epg_CA.xml"
    country: CA
    priority: 2
    enabled: true
    timeout: 120
    retry: 3
    time_shift_hours: -8
    per_channel_shifts:
      "12084": -8   # Nickelodeon.ca
      "12559": -8   # MTV.ca / MTV2.ca
      "12565": -8   # NatGeo.ca

  # xmltv.net CA returns non-XML content — disabled
  # - id: xmltv_ca
  #   url: "https://xmltv.net/xml_files/Canada.xml"
  #   country: CA
  #   priority: 2
  #   enabled: false

  # ── Italy ──────────────────────────────────────────────────────────────────
  # epg.pw IT returned non-XML content (HTTP 200 but HTML error page) — disabled
  # - id: epg_pw_it
  #   url: "https://epg.pw/xmltv/epg_IT.xml"
  #   country: IT
  #   priority: 1
  #   enabled: false
  #
  # Candidate replacement — verify URL before enabling:
  # - id: iptv_org_it
  #   name: "iptv-org Italy"
  #   url: "https://raw.githubusercontent.com/iptv-org/epg/gh-pages/guides/it/epg.xml"
  #   country: IT
  #   priority: 1
  #   enabled: false
  #   timeout: 120
  #   retry: 3

  # ── Spain ──────────────────────────────────────────────────────────────────
  # epg.pw ES returned non-XML content — disabled
  # - id: epg_pw_es
  #   url: "https://epg.pw/xmltv/epg_ES.xml"
  #   country: ES
  #   priority: 1
  #   enabled: false
  #
  # Candidate replacement — verify URL before enabling:
  # - id: iptv_org_es
  #   name: "iptv-org Spain"
  #   url: "https://raw.githubusercontent.com/iptv-org/epg/gh-pages/guides/es/epg.xml"
  #   country: ES
  #   priority: 1
  #   enabled: false
  #   timeout: 120
  #   retry: 3

  # ── Hungary ────────────────────────────────────────────────────────────────
  # epg.pw HU returned non-XML content — disabled
  # - id: epg_pw_hu
  #   url: "https://epg.pw/xmltv/epg_HU.xml"
  #   country: HU
  #   priority: 1
  #   enabled: false
  #
  # Rytec HU — returned non-XML content — disabled
  # - id: rytec_hu
  #   url: "https://github.com/sunsettrack4/schedule_sources/raw/main/epg/hu_epg.xml"
  #   country: HU
  #   priority: 2
  #   enabled: false

  # ── Serbia ─────────────────────────────────────────────────────────────────
  # epg.pw RS returned non-XML content — disabled
  # - id: epg_pw_rs
  #   url: "https://epg.pw/xmltv/epg_RS.xml"
  #   country: RS
  #   priority: 1
  #   enabled: false

  # ── Croatia ────────────────────────────────────────────────────────────────
  # epg.pw HR returned non-XML content — disabled
  # - id: epg_pw_hr
  #   url: "https://epg.pw/xmltv/epg_HR.xml"
  #   country: HR
  #   priority: 1
  #   enabled: false

  # ── Greece ─────────────────────────────────────────────────────────────────
  # epg.pw GR returned non-XML content — disabled
  # - id: epg_pw_gr
  #   url: "https://epg.pw/xmltv/epg_GR.xml"
  #   country: GR
  #   priority: 1
  #   enabled: false

  # ── Montenegro ─────────────────────────────────────────────────────────────
  # epg.pw ME returned non-XML content — disabled
  # - id: epg_pw_me
  #   url: "https://epg.pw/xmltv/epg_ME.xml"
  #   country: ME
  #   priority: 1
  #   enabled: false

output:
  combined_filename: epg.xml.gz
  per_country: true
  compress: true
  compress_level: 9

cache:
  dir: scripts/.cache
  use_conditional_get: true

settings:
  parallel_downloads: 3
  retry_delay_seconds: 30
  user_agent: "EPG-Aggregator/1.0 (+https://github.com/gjhayes/EPG)"
